<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FA COMÉRCIO</title>
</head>
<body>

<h1>FA COMÉRCIO ONLINE</h1>

<div id="produtos"></div>

<script>
fetch('/produtos')
.then(r=>r.json())
.then(p=>{
  let html="";
  p.forEach(x=>{
    html+=`<p>${x.nome} - Caixa: ${x.caixa}</p>`;
  });
  document.getElementById('produtos').innerHTML=html;
});
</script>

</body>
</html>
